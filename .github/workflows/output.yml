name: Output Information
on: workflow_dispatch
jobs:
    info:
        runs-on: ubuntu-latest
        steps:
            - name: Get workflow run information
              run: |
                echo "Workflow Run ID: ${{ github.run_id }}"
                echo "Workflow Run Number: ${{ github.run_number }}"
                echo "Workflow Run Attempt: ${{ github.run_attempt }}"
                echo "Workflow Run Event Name: ${{ github.event_name }}"
                echo "Workflow Run Actor: ${{ github.actor }}"
                echo "Workflow Run Repository: ${{ github.repository }}"
                echo "Workflow Run Branch: ${{ github.ref }}"
                echo "Workflow Run SHA: ${{ github.sha }}"